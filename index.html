     Bulletproof artwork image — fallback to elegant catalog plate if URL fails
     ════════════════════════════════════════════════════════════════════ */
  function ArtworkImage({ work, className = "", overlay = null }) {
    const sources = Array.isArray(work.img) ? work.img : [work.img];
    const [srcIdx, setSrcIdx] = useState(0);
    const [imgFailed, setImgFailed] = useState(false);
    const grad = "linear-gradient(135deg, " + work.palette[3] + " 0%, " + work.palette[2] + " 50%, " + work.palette[0] + " 100%)";
    const src = sources[Math.min(srcIdx, sources.length - 1)];
    const handleError = () => {
      if (srcIdx < sources.length - 1) {
        setSrcIdx(srcIdx + 1);
      } else {
        setImgFailed(true);
      }
    };
    return (
      <div className={"relative overflow-hidden " + className} style={{ background: grad }}>
        {!imgFailed && (
          <img
            src={src}
            alt={work.title}
            className="absolute inset-0 h-full w-full object-cover"
            loading="lazy"
            referrerPolicy="no-referrer"
            onError={handleError}
          />
        )}
        {imgFailed && <FallbackPlate work={work} />}
        {overlay}
      </div>
    );
  }

  /* ════════════════════════════════════════════════════════════════════
     Inline area chart
     ════════════════════════════════════════════════════════════════════ */
  function AreaChart({ data, accent = "#6B1F1F", height = 110, showLabels = false }) {
    const w = 600, pad = 4;
    const max = Math.max(...data.map(d => d.v));
    const pts = data.map((d, i) => {
      const x = (i / (data.length - 1)) * (w - pad * 2) + pad;
      const y = height - (d.v / max) * (height - 16) - 4;
      return [x, y];
    });
    const linePath = pts.map(([x, y], i) => (i === 0 ? "M" : "L") + " " + x.toFixed(1) + " " + y.toFixed(1)).join(" ");
    const areaPath = linePath + " L " + (w - pad) + " " + height + " L " + pad + " " + height + " Z";
    const gradId = "g-" + accent.slice(1);
    return (
      <svg viewBox={"0 0 " + w + " " + height} className="w-full" style={{ height: height + "px" }} preserveAspectRatio="none">
        <defs>
          <linearGradient id={gradId} x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stopColor={accent} stopOpacity="0.22" />
            <stop offset="100%" stopColor={accent} stopOpacity="0" />
          </linearGradient>
        </defs>
        {[0.25, 0.5, 0.75].map(t => (
          <line key={t} x1={pad} x2={w - pad} y1={height * t + 4} y2={height * t + 4}
                stroke="#161616" strokeOpacity="0.06" strokeDasharray="2 4" />
        ))}
        <path d={areaPath} fill={"url(#" + gradId + ")"} />
        <path d={linePath} fill="none" stroke={accent} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
        {pts.map(([x, y], i) => (
          <circle key={i} cx={x} cy={y} r="2.4" fill="#FAF6EC" stroke={accent} strokeWidth="1.4" />
        ))}
        {showLabels && data.map((d, i) => {
          const [x] = pts[i];
          return <text key={i} x={x} y={height - 0} fill="#6F665A" textAnchor="middle"
                       style={{ fontFamily: "JetBrains Mono", fontSize: "8px", letterSpacing: "0.1em" }}>
                   {d.m.toUpperCase()}
                 </text>;
        })}
      </svg>
    );
  }

  /* ════════════════════════════════════════════════════════════════════
     03 · Buyer Request (live conflict detection + comparables)
     ════════════════════════════════════════════════════════════════════ */
  function RequestScreen({ work, request, setRequest, onSubmit }) {
    const territories = ["Worldwide", "North America", "EU + UK", "Asia-Pacific", "Japan only"];
    const products = ["Luxury accessories", "Apparel — Capsule", "Editorial print", "Documentary feature", "Museum retail"];
    const durations = ["3 months", "6 months", "12 months", "24 months", "36 months"];
    const feeMap = { "3 months": 0.4, "6 months": 0.6, "12 months": 1, "24 months": 1.7, "36 months": 2.2 };
    const baseFee = work.feeRange[1] * 0.55;
    const computedFee = Math.round(baseFee * (feeMap[request.duration] || 1) / 1000) * 1000;
    const commission = Math.round(computedFee * 0.15);
    const aiUplift = request.aiOptIn ? Math.round(computedFee * 0.18) : 0;
    const totalFee = computedFee + aiUplift;

    useEffect(() => { setRequest(r => ({ ...r, fee: totalFee })); }, [request.duration, request.aiOptIn]);

    const conflict = useMemo(() => {
      const isApparel = request.productType === "Apparel — Capsule";
      const hasApparelConflict = work.rights.licensed.some(r => r.includes("Apparel"));
      if (isApparel && hasApparelConflict) {
        return { state: "blocked", msg: "Apparel — Capsule rights are licensed to LVMH (EU·2025-2027). Suggest alternate territory or product type." };
      }
      const isCommercial = request.productType === "Luxury accessories" && request.territory === "Worldwide";
      if (isCommercial && hasApparelConflict) {
        return { state: "warn", msg: "Worldwide grant overlaps with LVMH apparel scope in EU. Auto-adjusted: scope excludes EU apparel category." };
      }
      return { state: "clear", msg: "No conflicts. All requested rights available in stated territory and duration." };
    }, [request.territory, request.productType, work]);

    return (
      <section className="max-w-[1400px] mx-auto px-8 pt-12 pb-24">
        <PortalHeader portal="Buyer Portal" who="Vogue Collections · Lic. Director" />
        <div className="mt-10 grid grid-cols-1 lg:grid-cols-12 gap-10">
          <div className="lg:col-span-5 anim-fadeup">
            <ArtworkImage work={work} className="aspect-[4/5] border hairline" />
            <div className="mt-4 grid grid-cols-2 gap-3 text-[11px] ff-mono tracking-wider uppercase">
              <div className="border hairline p-3">
                <div className="muted text-[9px]">Catalog</div>
                <div className="mt-1">{work.catalog}</div>
              </div>
              <div className="border hairline p-3">
                <div className="muted text-[9px]">Inventory</div>
                <div className="mt-1">{work.inv}</div>
              </div>
              <div className="border hairline p-3">
                <div className="muted text-[9px]">Dimensions</div>
                <div className="mt-1 normal-case">{work.dimensions}</div>
              </div>
              <div className="border hairline p-3">
                <div className="muted text-[9px]">Provenance</div>
                <div className="mt-1 normal-case flex items-center gap-1.5"><ShieldCheck size={11} className="ox" /> Verified</div>
              </div>
            </div>
            <div className="mt-3 paper border hairline p-3">
              <div className="text-[9px] ff-mono tracking-widest uppercase muted">Exhibition history · {work.exhibitions.length}</div>
              <div className="mt-1.5 text-[12px] flex flex-wrap gap-x-3 gap-y-1">
                {work.exhibitions.map((e, i) => <span key={i} className="muted">{e}{i < work.exhibitions.length - 1 && ","}</span>)}
              </div>
            </div>
          </div>

          <div className="lg:col-span-7 anim-fadeup" style={{ animationDelay: "0.1s" }}>
            <div className="text-[11px] ff-mono tracking-[0.2em] uppercase muted">01 — Asset</div>
            <h2 className="ff-display text-[48px] leading-[0.95] mt-2">{work.title}</h2>
            <div className="text-[14px] muted mt-3 ff-mono tracking-wider uppercase">{work.year} · {work.medium}</div>

            <div className="mt-6 grid grid-cols-2 gap-px ink-bg border hairline-strong">
              <div className="cream p-4">
                <div className="text-[10px] ff-mono tracking-widest uppercase muted mb-2">Available</div>
                <ul className="space-y-1.5">
                  {work.rights.available.map(r => (
                    <li key={r} className="flex items-center gap-2 text-[12px]"><Check size={12} className="ox" /> {r}</li>
                  ))}
                </ul>
              </div>
              <div className="cream p-4">
                <div className="text-[10px] ff-mono tracking-widest uppercase muted mb-2">Currently licensed</div>
                {work.rights.licensed.length === 0 ? (
                  <div className="text-[12px] muted italic">None — fully open catalog</div>
                ) : (
                  <ul className="space-y-1.5">
                    {work.rights.licensed.map(r => (
                      <li key={r} className="text-[11px] muted leading-snug">{r}</li>
                    ))}
                  </ul>
                )}
              </div>
            </div>

            <div className="mt-8">
              <div className="text-[11px] ff-mono tracking-[0.2em] uppercase muted">02 — Draft request</div>
              <h3 className="ff-display text-[22px] mt-2 mb-4">Define the deal</h3>

              <FormRow label="Use case">
                <textarea value={request.useCase} onChange={e => setRequest({ ...request, useCase: e.target.value })}
                  rows={2} className="w-full bg-transparent text-[14px] outline-none resize-none" />
              </FormRow>
              <FormRow label="Territory" icon={<Globe size={13} />}>
                <SelectField value={request.territory} options={territories} onChange={(v) => setRequest({ ...request, territory: v })} />
              </FormRow>
              <FormRow label="Duration" icon={<Calendar size={13} />}>
                <SelectField value={request.duration} options={durations} onChange={(v) => setRequest({ ...request, duration: v })} />
              </FormRow>
              <FormRow label="Product type" icon={<FileText size={13} />}>
                <SelectField value={request.productType} options={products} onChange={(v) => setRequest({ ...request, productType: v })} />
              </FormRow>
              <FormRow label="AI training" icon={<Zap size={13} />}>
                <label className="flex items-center gap-3 cursor-pointer text-[13px]">
                  <input type="checkbox" checked={request.aiOptIn}
                    onChange={e => setRequest({ ...request, aiOptIn: e.target.checked })}
                    disabled={work.aiTraining.startsWith("Opt-out")}
                    className="w-4 h-4 accent-[#6B1F1F]" />
                  <span className={work.aiTraining.startsWith("Opt-out") ? "muted line-through" : ""}>
                    Add AI training rights · +18% fee
                  </span>
                  <span className="ml-auto text-[10px] ff-mono tracking-widest uppercase muted">{work.aiTraining}</span>
                </label>
              </FormRow>

              <div className={"mt-5 border p-4 flex items-start gap-3 paper " +
                (conflict.state === "clear" ? "border-[#3D5240]/30" :
                 conflict.state === "warn"  ? "border-[#8C6A1F]/40" :
                                              "border-[#6B1F1F]/40")}>
                {conflict.state === "clear"   && <ShieldCheck size={16} className="leaf flex-shrink-0 mt-0.5" />}
                {conflict.state === "warn"    && <AlertCircle size={16} className="gold flex-shrink-0 mt-0.5" />}
                {conflict.state === "blocked" && <X size={16} className="ox flex-shrink-0 mt-0.5" strokeWidth={2.5} />}
                <div className="flex-1">
                  <div className="text-[10px] ff-mono tracking-widest uppercase">
                    {conflict.state === "clear"   ? "All clear · 0 conflicts" :
                     conflict.state === "warn"    ? "Conflict resolved · auto-adjusted" :
                                                    "Conflict · resolution required"}
                  </div>
                  <div className="text-[12px] mt-1 muted">{conflict.msg}</div>
                </div>
                <span className="text-[9px] ff-mono tracking-widest uppercase muted whitespace-nowrap">live · 0.4s</span>
              </div>

              <div className="mt-5 ink-bg text-white p-5 flex items-end justify-between">
                <div>
                  <div className="text-[10px] ff-mono tracking-widest uppercase opacity-60">Estimated license fee</div>
                  <div className="ff-display text-[36px] leading-none mt-2">${totalFee.toLocaleString()}</div>
                  <div className="text-[10px] mt-1.5 ff-mono tracking-wider uppercase opacity-60">
                    Base ${computedFee.toLocaleString()}{aiUplift > 0 && ` + AI rights $${aiUplift.toLocaleString()}`} · ArtChain commission ${commission.toLocaleString()}
                  </div>
                </div>
                <div className="text-right text-[10px] ff-mono tracking-widest uppercase opacity-60">Quoted at<br />submission</div>
              </div>

              <button onClick={onSubmit} disabled={conflict.state === "blocked"}
                className={"mt-4 w-full py-4 flex items-center justify-center gap-3 group " +
                  (conflict.state === "blocked" ? "border hairline-strong muted cursor-not-allowed" : "ox-bg text-white")}>
                <span className="text-[12px] tracking-[0.2em] uppercase ff-mono">
                  {conflict.state === "blocked" ? "Resolve conflict to continue" : "Submit license request"}
                </span>
                {conflict.state !== "blocked" && <ArrowRight size={16} className="group-hover:translate-x-1 transition-transform" />}
              </button>
              <p className="text-[11px] muted mt-3 text-center">Routes instantly to Pollock Estate · No emails, no lawyers</p>
            </div>

            <div className="mt-10 anim-fadeup" style={{ animationDelay: "0.3s" }}>
              <div className="flex items-center justify-between mb-3">
                <div>
                  <div className="text-[11px] ff-mono tracking-[0.2em] uppercase muted">Comparable transactions</div>
                  <h3 className="ff-display text-[20px] mt-1">Last {COMPARABLES.length} similar deals on the platform</h3>
                </div>
                <button className="text-[11px] ff-mono tracking-widest uppercase muted hover:ink">View all →</button>
              </div>
              <div className="border hairline divide-y hairline">
                {COMPARABLES.map((c, i) => (
                  <div key={i} className="p-3 grid grid-cols-12 gap-3 items-center text-[12px]">
                    <div className="col-span-3 ff-display text-[14px]">{c.buyer}</div>
                    <div className="col-span-4 muted">{c.asset}</div>
                    <div className="col-span-2 ff-mono text-[10px] tracking-widest uppercase muted">{c.territory}</div>
                    <div className="col-span-1 ff-mono text-[10px] tracking-widest uppercase muted">{c.duration}</div>
                    <div className="col-span-1 ff-display text-right">${(c.fee/1000).toFixed(0)}K</div>
                    <div className="col-span-1 text-right text-[10px] ff-mono tracking-widest uppercase muted">{c.date}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </section>
    );
  }

  function FormRow({ label, children, icon }) {
    return (
      <div className="border-b hairline py-3 grid grid-cols-3 gap-6 items-start">
        <div className="text-[11px] ff-mono tracking-[0.18em] uppercase muted flex items-center gap-2 pt-1">{icon} {label}</div>
        <div className="col-span-2">{children}</div>
      </div>
    );

  function SelectField({ value, options, onChange }) {
    return (
      <select value={value} onChange={e => onChange(e.target.value)}
        className="w-full bg-transparent text-[14px] outline-none border-b hairline pb-1 ff-body cursor-pointer"
        style={{ appearance: "none", backgroundImage: 'url("data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'10\' height=\'6\'><path d=\'M0 0l5 6 5-6z\' fill=\'%23161616\'/></svg>")', backgroundRepeat: "no-repeat", backgroundPosition: "right center" }}>
        {options.map(o => <option key={o}>{o}</option>)}

  /* ════════════════════════════════════════════════════════════════════
     04 · Platform — processing engine
     ════════════════════════════════════════════════════════════════════ */
  function PlatformScreen({ onContinue }) {
    const steps = [
      { label: "Provenance & rights schema verified",       sub: "PE·1949·014 · 4 prior exhibitions confirmed against estate ledger" },
      { label: "Conflict check across active licenses",     sub: "Cross-checked 12 active deals · 0 territorial overlaps · 0 product overlaps" },
      { label: "Auto-filling master license template",      sub: "Template ALC-v4.2 · 14 fields populated · 0 manual edits required" },
      { label: "Royalty schedule computed",                 sub: "Estate 80% · ArtChain 15% · Trust reserve 5% · auto-distribution scheduled" },
      { label: "Multi-trustee notification routed",         sub: "3 trustees · M. Pollock-Krasner (lead), D. Halberstam, S. Wei (counsel)" },
    ];
    const [done, setDone] = useState(0);
    useEffect(() => {
      if (done < steps.length) {
        const t = setTimeout(() => setDone(d => d + 1), done === 0 ? 600 : 750);
        return () => clearTimeout(t);
      }
    }, [done]);

    return (
      <section className="max-w-[1400px] mx-auto px-8 pt-16 pb-24">
        <div className="text-[11px] ff-mono tracking-[0.2em] uppercase muted anim-fade flex items-center gap-3">
          <span className="w-1.5 h-1.5 rounded-full pulse-dot leaf-bg" />
          ArtChain Platform · Real-time processing
        </div>
        <h2 className="ff-display text-[56px] leading-[1] mt-4 max-w-[20ch] anim-fadeup">
          Where the contract,<br />compliance, and lawyers <span className="italic ox">used to live.</span>
        </h2>
        <p className="muted text-[15px] mt-4 max-w-[60ch] anim-fadeup" style={{ animationDelay: "0.1s" }}>
          Five operations that historically took weeks now run in seconds. The estate sees only the final, ready-to-approve contract — the buyer sees confirmation that everything below was checked.
        </p>

        <div className="mt-14 grid grid-cols-1 lg:grid-cols-12 gap-10">
          <div className="lg:col-span-7">
            <ol className="border-l hairline-strong">
              {steps.map((s, i) => {
                const isDone = i < done, isActive = i === done;
                return (
                  <li key={i} className="relative pl-8 pb-8 anim-fade" style={{ animationDelay: (i * 0.15) + "s" }}>
                    <span className={"absolute -left-[7px] top-1 w-3.5 h-3.5 border hairline-strong flex items-center justify-center " + (isDone ? "ink-bg" : "cream")}>
                      {isDone && <Check size={9} className="text-white" strokeWidth={3} />}
                    </span>
                    <div className={"flex items-start gap-3 " + (isDone ? "" : isActive ? "" : "opacity-30")}>
                      <div className="flex-1">
                        <div className="ff-display text-[19px] leading-snug flex items-center gap-2">
                          {s.label}
                          {isActive && <Loader2 size={14} className="spin-slow muted" />}
                        </div>
                        <div className="text-[12px] ff-mono tracking-wider muted mt-1.5">{s.sub}</div>
                      </div>
                      <div className="ff-mono text-[10px] tracking-widest uppercase muted whitespace-nowrap pt-1">
                        {isDone ? "✓ DONE" : isActive ? "RUNNING" : "QUEUED"}
                      </div>
                    </div>
                  </li>
                );
              })}
            </ol>
            {done >= steps.length && (
              <button onClick={onContinue} className="mt-4 ink-bg text-white px-7 py-3.5 flex items-center gap-3 group anim-fade">
                <span className="text-[12px] tracking-[0.2em] uppercase ff-mono">View Estate Portal</span>
                <ArrowRight size={16} className="group-hover:translate-x-1 transition-transform" />
              </button>
            )}
          </div>

          <aside className="lg:col-span-5 paper border hairline p-7 self-start">
            <div className="text-[11px] ff-mono tracking-[0.2em] uppercase muted mb-6">Behind the surface</div>
            <Stat k="Avg. processing time"  v="3.2 sec"   foot="vs 4–6 weeks of manual review" />
            <Stat k="Lawyer hours saved"    v="11 hrs"    foot="per transaction" />
            <Stat k="Contract auto-fields"  v="14 / 14"   foot="0 manual edits required" />
            <Stat k="Audit footprint"       v="immutable" foot="every action signed & timestamped" />
            <Stat k="Royalty distribution"  v="auto"      foot="scheduled to estate accounts" />

            <div className="mt-6 pt-5 border-t hairline">
              <div className="text-[10px] ff-mono tracking-widest uppercase muted mb-3">Audit log · last 5 events</div>
              <div className="space-y-2">
                {[
                  ["14:32:08", "Request received", "vc-04293"],
                  ["14:32:09", "Schema validated", "PE·1949·014"],
                  ["14:32:10", "Conflict scan run", "12 deals"],
                  ["14:32:10", "Contract drafted",  "ALC-v4.2"],
                  ["14:32:11", "Trustees notified", "3 of 3"],
                ].map(([t, ev, ref], i) => (
                  <div key={i} className="grid grid-cols-12 gap-2 text-[10px] ff-mono">
                    <span className="col-span-3 muted">{t}</span>
                    <span className="col-span-6">{ev}</span>
                    <span className="col-span-3 muted text-right truncate">{ref}</span>
                  </div>
                ))}
              </div>
            </div>
          </aside>
        </div>
      </section>
    );
  }

  function Stat({ k, v, foot }) {
    return (
      <div className="border-t hairline py-3 first:border-t-0 first:pt-0">
        <div className="flex items-baseline justify-between gap-4">
          <div className="text-[12px] muted ff-mono tracking-wider uppercase">{k}</div>

          <div className="flex items-end justify-between mb-5">
            <div>
              <div className="text-[11px] ff-mono tracking-[0.2em] uppercase muted">01 — Asset library</div>
              <h3 className="ff-display text-[28px] mt-1">Production-ready files</h3>
              <p className="muted text-[13px] mt-2">All files watermarked with your license ID. Downloads logged on-chain.</p>
            </div>
            <button className="border hairline-strong px-5 py-2.5 text-[11px] ff-mono tracking-[0.2em] uppercase flex items-center gap-2 hover:ink-bg hover:text-white">
              <Download size={12} /> Download all (412MB)
            </button>
          </div>
          <div className="flex flex-wrap gap-2 mb-4">
            {categories.map((category) => (
              <button key={category} onClick={() => setActiveFileFilter(category)}
                className={"px-3 py-1.5 text-[10px] ff-mono tracking-[0.16em] uppercase border transition " + (activeFileFilter === category ? "ink-bg text-white border-[#161616]" : "paper border hairline hover:border-[#161616]/45")}>
                {category}
              </button>
            ))}
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
            {visibleFiles.map((f, i) => (
              <button key={i} onClick={() => setSelectedFile(f)} className="paper border hairline p-4 group hover:border-[#161616]/50 transition cursor-pointer text-left">
                <div className="flex items-start justify-between">
                  <div className="w-9 h-9 cream border hairline flex items-center justify-center">{f.icon}</div>
                  <span className="text-[9px] ff-mono tracking-widest uppercase muted">{f.ext}</span>
                </div>
                <div className="ff-display text-[16px] mt-3 leading-tight">{f.name}</div>
                <div className="text-[11px] muted mt-1">{f.desc}</div>
                <div className="text-[9px] ff-mono uppercase tracking-widest mt-2 ox">{f.category}</div>
                <div className="mt-3 pt-3 border-t hairline flex items-center justify-between text-[10px] ff-mono tracking-wider uppercase">
                  <span className="muted">{f.size}</span>
                  <span className="ink flex items-center gap-1 group-hover:translate-x-0.5 transition-transform">
                    <Eye size={11} /> Preview
                  </span>
                </div>
              </button>
            ))}
          </div>
          <div className="mt-4 text-[10px] ff-mono tracking-[0.14em] uppercase muted">Demo preview only · Access controlled by license ID · Logged on-chain</div>
          {demoMessage && <div className="mt-3 text-[11px] ox">{demoMessage}</div>}
        </div>
        {selectedFile && (
          <div className="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-6" onClick={() => setSelectedFile(null)}>
            <div className="paper border hairline-strong w-full max-w-[780px] p-6 md:p-8 relative" onClick={(e) => e.stopPropagation()}>
              <button onClick={() => setSelectedFile(null)} className="absolute right-4 top-4 border hairline p-1.5"><X size={14} /></button>
              <div className="text-[10px] ff-mono tracking-[0.18em] uppercase muted">Demo preview only</div>
              <h4 className="ff-display text-[32px] leading-[1.05] mt-2">{selectedFile.name}</h4>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mt-4 text-[11px]">
                <div><div className="ff-mono uppercase muted text-[9px]">Category</div><div>{selectedFile.category}</div></div>
                <div><div className="ff-mono uppercase muted text-[9px]">File type</div><div>{selectedFile.type}</div></div>
                <div><div className="ff-mono uppercase muted text-[9px]">File size</div><div>{selectedFile.size}</div></div>
                <div><div className="ff-mono uppercase muted text-[9px]">Status</div><div className="leaf">Logged on-chain</div></div>
              </div>
              <p className="mt-5 text-[14px] muted">{selectedFile.description}</p>
              <p className="mt-2 text-[13px]"><span className="ff-mono uppercase text-[10px] muted">Example usage:</span> {selectedFile.usage}</p>
              <div className="mt-5 border hairline bg-gradient-to-br from-[#efe7d7] to-[#e5dac5] p-6 h-[140px] flex items-end justify-between">
                <span className="ff-mono text-[10px] tracking-widest uppercase">{selectedFile.ext} sample · license VC-0042</span>
                <span className="text-[10px] ff-mono uppercase muted">Access controlled by license ID</span>
              </div>
              <div className="mt-6 flex flex-wrap gap-2">
                <button onClick={() => setDemoMessage("Sample file access recorded for demo.")} className="ink-bg text-white px-4 py-2 text-[10px] ff-mono tracking-[0.16em] uppercase">Open example</button>
                <button onClick={() => setDemoMessage("Sample file access recorded for demo.")} className="border hairline-strong px-4 py-2 text-[10px] ff-mono tracking-[0.16em] uppercase">Download sample</button>
                <button onClick={() => setSelectedFile(null)} className="border hairline px-4 py-2 text-[10px] ff-mono tracking-[0.16em] uppercase">Close</button>
              </div>
            </div>
          </div>
        )}

        <div className="mt-12 grid grid-cols-1 lg:grid-cols-12 gap-px ink-bg border hairline-strong anim-fadeup" style={{ animationDelay: "0.2s" }}>
          <div className="lg:col-span-5 cream p-6">
            <div className="text-[11px] ff-mono tracking-[0.2em] uppercase muted">02 — Sales reporting</div>
            <h3 className="ff-display text-[22px] mt-1 mb-4">Royalty obligation · live</h3>

            <div className="space-y-4">
              <div>
                <label className="text-[10px] ff-mono tracking-widest uppercase muted">Units sold this period</label>
                <div className="flex items-center gap-3 mt-1.5">
                  <input type="number" value={units} onChange={e => setUnits(parseInt(e.target.value || "0"))}
                    className="flex-1 bg-transparent border-b hairline pb-1 outline-none ff-display text-[28px] leading-none" />
                  <span className="text-[10px] ff-mono tracking-widest uppercase muted">units</span>
                </div>
              </div>
              <div>
                <label className="text-[10px] ff-mono tracking-widest uppercase muted">Retail price per unit</label>
                <div className="flex items-center gap-3 mt-1.5">
                  <span className="ff-display text-[28px] leading-none">$</span>
                  <input type="number" value={retailPrice} onChange={e => setRetailPrice(parseInt(e.target.value || "0"))}
                    className="flex-1 bg-transparent border-b hairline pb-1 outline-none ff-display text-[28px] leading-none" />
                </div>
              </div>
            </div>

            <div className="mt-6 paper border hairline p-4 space-y-2 text-[13px]">
              <div className="flex justify-between">
                <span className="muted">Gross retail value</span>
                <span className="ff-mono">${grossRetail.toLocaleString()}</span>
              </div>
              <div className="flex justify-between">
                <span className="muted">Royalty owed (4%)</span>
                <span className="ff-mono ox">${royaltyOwed.toLocaleString()}</span>
              </div>
              <div className="flex justify-between border-t hairline pt-2">
                <span className="muted">Net to Vogue</span>
                <span className="ff-mono ff-display text-[16px]">${margin.toLocaleString()}</span>
              </div>
            </div>

            <button className="mt-4 w-full ink-bg text-white py-3 flex items-center justify-center gap-2">
              <Plus size={13} />
              <span className="text-[11px] ff-mono tracking-[0.2em] uppercase">Submit sales report · auto-pay royalty</span>
            </button>

            <div className="mt-5 pt-4 border-t hairline">
              <div className="text-[10px] ff-mono tracking-widest uppercase muted mb-2">Recent reports</div>
              <div className="space-y-1.5 text-[11px] ff-mono">
                {[
                  ["Mar 2026", "1,420 units", "$2,386"],
                  ["Feb 2026", "892 units",   "$1,498"],
                  ["Jan 2026", "564 units",   "$948"],
                ].map((r, i) => (
                  <div key={i} className="grid grid-cols-3 gap-2">
                    <span className="muted tracking-wider uppercase">{r[0]}</span>
                    <span>{r[1]}</span>
                    <span className="text-right">{r[2]} paid</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div className="lg:col-span-7 cream p-6">
            <div className="flex items-end justify-between mb-2">
              <div>
                <div className="text-[11px] ff-mono tracking-[0.2em] uppercase muted">03 — Revenue projection</div>
                <h3 className="ff-display text-[22px] mt-1">Sell-through forecast · 12 mo</h3>
              </div>
              <div className="text-right">
                <div className="ff-display text-[32px] leading-none">${(projectedYearRevenue / 1000000).toFixed(2)}M</div>
                <div className="text-[10px] ff-mono tracking-widest uppercase muted mt-1">Projected gross retail</div>
              </div>
            </div>
            <p className="text-[12px] muted mb-4">Modelled from comparable Hermès × Calder (2024) and LVMH × Pollock (2025) capsule data.</p>
            <AreaChart data={projection} accent="#3D5240" height={140} showLabels />

            <div className="mt-6 grid grid-cols-3 gap-3">
              <div className="paper border hairline p-3">
                <div className="text-[9px] ff-mono tracking-widest uppercase muted">Break-even</div>
                <div className="ff-display text-[20px] mt-1">{breakeven} units</div>
                <div className="text-[10px] ff-mono tracking-wider uppercase muted mt-0.5">≈ M2</div>
              </div>
              <div className="paper border hairline p-3">
                <div className="text-[9px] ff-mono tracking-widest uppercase muted">Total royalty owed</div>
                <div className="ff-display text-[20px] mt-1">${(projectedYearRevenue * 0.04 / 1000).toFixed(0)}K</div>
                <div className="text-[10px] ff-mono tracking-wider uppercase muted mt-0.5">across 12 months</div>
              </div>
              <div className="paper border hairline p-3">
                <div className="text-[9px] ff-mono tracking-widest uppercase muted">Projected net margin</div>
                <div className="ff-display text-[20px] mt-1">56%</div>
                <div className="text-[10px] ff-mono tracking-wider uppercase muted mt-0.5">after royalty + COGS</div>
              </div>
            </div>
          </div>
        </div>

        <div className="mt-12 anim-fadeup" style={{ animationDelay: "0.25s" }}>
          <div className="flex items-end justify-between mb-5">
            <div>
              <div className="text-[11px] ff-mono tracking-[0.2em] uppercase muted">04 — Bundle intelligence</div>
              <h3 className="ff-display text-[28px] mt-1">License alongside · save up to 22%</h3>
              <p className="muted text-[13px] mt-2">Brands that licensed Pollock works also licensed these — historical bundle data from the platform.</p>
            </div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            {[
              { artist: "Mark Rothko Foundation", work: "Untitled (Yellow, Orange)", reason: "Color-story complement · 4 buyers paired", save: "22%", fee: "$78K" },
              { artist: "Calder Estate",          work: "Mobile, 1962",              reason: "Form-language adjacent · 3 buyers paired",  save: "18%", fee: "$52K" },
              { artist: "Cy Twombly Foundation",  work: "Untitled study, 1953",      reason: "Mark-making complement · 2 buyers paired",  save: "15%", fee: "$48K" },
            ].map((b, i) => (
              <div key={i} className="paper border hairline p-5 group hover:border-[#161616]/50 transition cursor-pointer">
                <div className="flex items-start justify-between">
                  <div className="text-[10px] ff-mono tracking-widest uppercase muted">Bundle save · {b.save}</div>
                  <Plus size={14} className="ox" />
                </div>
                <div className="ff-display text-[18px] mt-3 leading-tight">{b.work}</div>
                <div className="text-[12px] ff-mono tracking-wider uppercase muted mt-1">{b.artist}</div>
                <p className="text-[12px] mt-3 muted">{b.reason}</p>
                <div className="mt-4 pt-3 border-t hairline flex items-center justify-between">
                  <span className="ff-display text-[14px]">{b.fee}</span>
                  <span className="text-[10px] ff-mono tracking-widest uppercase ink flex items-center gap-1 group-hover:translate-x-0.5 transition-transform">
                    Add to bundle <ArrowRight size={11} />
                  </span>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div className="mt-16 ink-bg text-white p-10 anim-fadeup" style={{ animationDelay: "0.3s" }}>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-10 items-center">
            <div>
              <div className="text-[11px] ff-mono tracking-[0.2em] uppercase opacity-60">For the buyer</div>
              <h3 className="ff-display text-[36px] leading-tight mt-3">
                A license that <span className="italic" style={{ color: "#E8B47A" }}>pays for itself</span> in 60 days, then keeps paying.
              </h3>
              <p className="opacity-70 text-[14px] mt-4 leading-relaxed">
                Vogue's $35K license becomes the foundation for a $2.6M projected scarf line — with royalty obligations tracked, paid, and audited automatically.
                Both sides win, and both sides have proof.
              </p>
            </div>
            <div className="grid grid-cols-2 gap-4">
              <div className="border border-white/15 p-5">
                <div className="text-[10px] ff-mono tracking-widest uppercase opacity-60">License fee</div>
                <div className="ff-display text-[28px] mt-1">${request.fee.toLocaleString()}</div>
              </div>
              <div className="border border-white/15 p-5">
                <div className="text-[10px] ff-mono tracking-widest uppercase opacity-60">Projected revenue</div>
                <div className="ff-display text-[28px] mt-1" style={{ color: "#E8B47A" }}>${(projectedYearRevenue/1000000).toFixed(2)}M</div>
              </div>
              <div className="border border-white/15 p-5">
                <div className="text-[10px] ff-mono tracking-widest uppercase opacity-60">ROI multiple</div>
                <div className="ff-display text-[28px] mt-1">74×</div>
              </div>
              <div className="border border-white/15 p-5">
                <div className="text-[10px] ff-mono tracking-widest uppercase opacity-60">Estate share</div>
                <div className="ff-display text-[28px] mt-1">${Math.round(projectedYearRevenue * 0.04 / 1000)}K</div>
              </div>
            </div>
          </div>
        </div>

        <div className="mt-16 text-center anim-fadeup" style={{ animationDelay: "0.4s" }}>
          <div className="ff-display text-[28px] italic max-w-[44ch] mx-auto leading-snug">
            "The infrastructure that makes both the catalog and the cash register work."
          </div>
          <div className="mt-10 flex flex-col sm:flex-row gap-4 justify-center">
            <button onClick={onRestart} className="ink-bg text-white px-7 py-3.5 flex items-center justify-center gap-3">
              <span className="text-[12px] tracking-[0.2em] uppercase ff-mono">Restart walkthrough</span>
              <ArrowRight size={16} />
            </button>
            <a href="https://artchain.pages.dev" target="_blank" rel="noreferrer" className="border hairline-strong px-7 py-3.5 flex items-center justify-center gap-3 hover:ink-bg hover:text-white transition">
              <Eye size={14} />
              <span className="text-[12px] tracking-[0.2em] uppercase ff-mono">Continue to the ask</span>
            </a>
          </div>
        </div>
      </section>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<ArtChainMVP />);
  </script>
</body>
</html>
